name: build

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # verify = compile + tests (JenkinsRule) + SpotBugs
      - name: Build & verify
        run: mvn -B -ntp clean verify

      - name: Upload plugin (.hpi)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cxray-jenkins-hpi
          path: target/*.hpi
          if-no-files-found: error
