name: build

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # SLSA build provenance
      attestations: write
    steps:
      # Actions pinned to full commit SHAs (a security gate must follow its own supply-chain hygiene).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # verify = compile + tests (JenkinsRule) + SpotBugs
      - name: Build & verify
        run: mvn -B -ntp clean verify

      - name: Checksum the .hpi + SBOM
        if: success()
        run: |
          cd target
          sha256sum *.hpi cxray-jenkins-sbom.json | tee SHA256SUMS

      - name: Upload plugin (.hpi + SBOM + checksum)
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cxray-jenkins-hpi
          path: |
            target/*.hpi
            target/cxray-jenkins-sbom.json
            target/SHA256SUMS
          if-no-files-found: error

      # SLSA build provenance for the artifact — only on push (fork PRs lack id-token).
      - name: Attest build provenance
        if: success() && github.event_name == 'push'
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: target/*.hpi
