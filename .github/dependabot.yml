version: 2
updates:
  # The plugin's own dependencies (jackson2-api, credentials, structs, parent POM, BOM).
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  # Keep the CI actions (pinned to SHAs) up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
